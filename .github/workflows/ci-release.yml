name: CI (Release)
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v7
      with:
        submodules: true

    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '6.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Publish
      run: dotnet publish -p:PublishSingleFile=true -p:CommitHash=${{ github.sha }} -p:CommitRef=${{ github.ref_type }}/${{ github.ref_name }} -r win-x64 -c Release --self-contained false .\Bloxstrap\Goldstrap.csproj

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        #name: Goldstrap (Release) (${{ github.sha }})
        path: .\Bloxstrap\bin\Release\net6.0-windows\win-x64\publish\Goldstrap.exe
        archive: false

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        #with:
        #  name: Goldstrap (Release) (${{ github.sha }})
        #  path: release

      #- name: Rename binaries
      #  run: mv release/Goldstrap.exe Goldstrap.exe

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: Goldstrap.exe
          name: Goldstrap ${{ github.ref_name }}
          fail_on_unmatched_files: true

  release-test:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/release-test')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        #with:
        #  name: Goldstrap (Release) (${{ github.sha }})
        #  path: release

      #- name: Rename binaries
      #  run: mv release/Goldstrap.exe Goldstrap.exe

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: Goldstrap.exe
          name: Goldstrap ${{ github.ref_name }}
          fail_on_unmatched_files: true
